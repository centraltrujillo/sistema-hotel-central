<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido | Hotel Central</title>
  <link rel="icon" type="image/png" href="img/logo.png" />


  <link rel="stylesheet" href="css/colors.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  
  <style>
    /* 🌟 Reset y Estilos Base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      
      /* Uso de tus variables de colores */
      background: linear-gradient(135deg, var(--vino-tinto), var(--marron-zocalo));
      color: var(--amarillo-ocre); 
      
      /* Uso de tu variable de fuente principal de colors.css */
      font-family: var(--font-main);
      
      text-align: center;
      overflow: hidden;
      transition: transform 0.9s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.7s ease;
    }

    /* 🚀 Efecto Deslizar hacia Arriba */
    .slide-up-exit {
      transform: translateY(-100vh);
      opacity: 0;
    }

    h1 {
      /* Uso de tu variable de títulos de colors.css */
      font-family: var(--font-titles);
      font-size: 2.8rem;
      letter-spacing: 3px;
      margin-bottom: 1rem;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInUp 1.2s ease-out forwards;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
    }

    p {
      /* Uso de tu variable de fuente principal de colors.css */
      font-family: var(--font-main);
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 5px;
      margin-bottom: 3rem;
      color: var(--blanco-colonial);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInUp 1.5s ease-out forwards;
    }

    /* 🔄 Loader de lujo */
    .loader {
      position: relative;
      width: 60px;
      height: 60px;
    }

    .loader span {
      display: block;
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid rgba(245, 245, 245, 0.1); 
      border-top-color: var(--amarillo-ocre); 
      animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
    }

    .loader span:nth-child(2) {
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
      animation-duration: 2s;
      border-top-color: var(--blanco-colonial);
    }

    /* Animaciones */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      0% { 
        opacity: 0; 
        transform: translateY(40px); 
      }
      100% { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }
  </style>
</head>
<body id="main-content">

  <h1>Hotel Central</h1>
  <p>Tradición y confort en un solo lugar</p>

  <div class="loader">
    <span></span>
    <span></span>
  </div>

  <script>
    setTimeout(() => {
      const body = document.getElementById('main-content');
      body.classList.add('slide-up-exit');

      setTimeout(() => {
        window.location.href = "inicio.html";
      }, 900);
    }, 2500); 
  </script>

</body>
</html>
