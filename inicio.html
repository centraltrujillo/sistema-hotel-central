<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso | Hotel Central</title>
  <link rel="icon" type="image/png" href="img/logo.png" />

    
  <link rel="stylesheet" href="css/colors.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  
  <style>
    /* 🌟 Reset y Estilos Base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: var(--negro);
      color: var(--blanco);
      /* Fuente principal desde colors.css */
      font-family: var(--font-main), sans-serif;
      overflow: hidden;
      display: flex;
    }

    /* 🚀 Animación de Entrada */
    .page-container {
      display: flex;
      width: 100%;
      height: 100%;
      animation: slideInUp 1s cubic-bezier(0.7, 0, 0.3, 1) forwards;
    }

    @keyframes slideInUp {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(0); }
    }

    /* 🖼️ Lado Izquierdo: Tu imagen F04.jpg */
    .left-side {
      flex: 1.2;
      background: url('img/F04.jpg') no-repeat center center;
      background-size: cover;
      position: relative;
    }

    .left-side::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    /* 📋 Lado Derecho: Contenido */
    .right-side {
      flex: 0.8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      /* Degradado elegante con tus colores vino y marrón */
      background: linear-gradient(135deg, var(--vino-tinto), var(--marron-zocalo));
      border-left: 1px solid var(--amarillo-ocre);
      position: relative;
    }

    .right-side::before {
      content: '';
      position: absolute;
      top: 40px; right: 40px;
      width: 50px; height: 50px;
      border-top: 2px solid var(--amarillo-ocre);
      border-right: 2px solid var(--amarillo-ocre);
      opacity: 0.6;
    }

    .brand-title {
      /* Fuente de títulos desde colors.css */
      font-family: var(--font-titles), serif;
      font-size: 3.2rem;
      color: var(--amarillo-ocre);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-align: center;
      text-shadow: 2px 2px 15px rgba(0,0,0,0.5);
    }

    .brand-tagline {
      /* Fuente principal desde colors.css */
      font-family: var(--font-main), sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 60px;
      color: var(--blanco-colonial);
      opacity: 0.8;
      text-align: center;
    }

    /* 🔘 Botones */
    .button-container {
      display: flex;
      flex-direction: column;
      gap: 25px;
      width: 100%;
      max-width: 320px;
    }

    .btn {
      padding: 18px 30px;
      /* Fuente principal desde colors.css */
      font-family: var(--font-main), sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      border: 1px solid var(--amarillo-ocre);
      background: transparent;
      color: var(--amarillo-ocre);
      cursor: pointer;
      transition: all 0.4s ease;
      text-decoration: none;
      text-align: center;
    }

    .btn-login {
      background: var(--amarillo-ocre);
      color: var(--marron-zocalo); /* Texto oscuro para mejor contraste */
    }

    .btn-login:hover {
      background: transparent;
      color: var(--amarillo-ocre);
      box-shadow: 0 0 20px rgba(212, 160, 23, 0.3);
    }

    .btn-register:hover {
      border-color: var(--rojo-vibrante);
      color: var(--rojo-vibrante);
      background: rgba(198, 40, 40, 0.05);
      transform: translateY(-2px);
    }

  </style>
</head>
<body>

  <div class="page-container">
    
    <div class="left-side"></div>

    <div class="right-side">
      <h1 class="brand-title">Hotel Central</h1>
      <p class="brand-tagline">Tradición y confort en un solo lugar</p>

      <div class="button-container">
        <a href="login.html" class="btn btn-login">Iniciar Sesión</a>
      </div>
    </div>

  </div>

</body>
</html>
