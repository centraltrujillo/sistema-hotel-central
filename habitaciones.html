<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitaciones | Hotel Central</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/dashboard.css"> 
    <link rel="stylesheet" href="css/habitaciones.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo-box">
                <div class="logo-icon">
                    <img src="img/logo.jpeg" alt="Logo" style="width: 100%; height: auto; border-radius: 4px;">
                </div>
                <div>
                    <h3>Hotel Central</h3>
                    <p>Sistema de Gestión</p>
                </div>
            </div>
            <nav class="nav-menu">
              <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
              <a href="habitaciones.html" class="nav-link active"><i class="fa-solid fa-bed"></i> Habitaciones</a>
              <a href="reservas.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Reservas</a>
              <a href="huespedes.html" class="nav-link"><i class="fa-solid fa-users"></i> Huéspedes</a>
              <a href="calendario.html" class="nav-link"><i class="fa-solid fa-calendar-days"></i> Calendario</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h2>Gestión de Habitaciones</h2>
                <p id="current-date" style="font-size: 0.9rem; color: var(--text-light);"></p>
            </div>

            <div class="hab-stats">
                <div class="stat-card-mini">
                    <span>Total Habitaciones</span>
                    <h3 id="stat-total">--</h3>
                </div>
                <div class="stat-card-mini">
                    <span>Disponibles</span>
                    <h3 id="stat-libres" style="color:#2e7d32">--</h3>
                </div>
                <div class="stat-card-mini">
                    <span>Ocupadas</span>
                    <h3 id="stat-ocupadas" style="color:#800020">--</h3>
                </div>
            </div>

            <div class="search-bar">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchHab" placeholder="Buscar por número de habitación (Ej: 204)...">
            </div>

            <div class="hab-grid" id="habGrid">
                <div class="loading-state">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>Sincronizando con Hotel Central...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/habitaciones.js"></script>

    <script>
        // Pequeño script para mostrar la fecha actual en el header
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', options);
    </script>
</body>
</html>
