<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | Hotel Central</title>
    
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/dashboard.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

    <style>
        /* Estilos personalizados para el Calendario del Hotel Central */
        .card-calendar {
            background: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            margin-top: 10px;
        }

        /* Título Principal */
        .fc .fc-toolbar-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px !important;
            color: #1e293b;
            text-transform: capitalize;
        }

        /* Botones de Navegación */
        .fc .fc-button-primary {
            background-color: #ffffff !important;
            border: 1px solid #e2e8f0 !important;
            color: #64748b !important;
            font-size: 13px !important;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .fc .fc-button-primary:hover {
            background-color: #800020 !important; /* Burgundy */
            color: #ffffff !important;
            border-color: #800020 !important;
        }

        /* Botón de Vista Activa */
        .fc .fc-button-active {
            background-color: #800020 !important;
            border-color: #800020 !important;
            color: #ffffff !important;
        }

        /* Cabecera de Días */
        .fc .fc-col-header-cell {
            background-color: #f8fafc;
            padding: 10px 0;
        }

        .fc .fc-col-header-cell-cushion {
            color: #475569;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            text-decoration: none;
        }

        /* Números de los días */
        .fc .fc-daygrid-day-number {
            font-size: 14px;
            font-family: 'Lato', sans-serif;
            color: #64748b;
            padding: 8px !important;
            text-decoration: none;
        }

        /* Día de hoy */
        .fc .fc-day-today {
            background-color: rgba(204, 153, 0, 0.08) !important; /* Ámbar suave */
        }

        /* Estilo de los Eventos */
        .fc-event {
            border: none !important;
            padding: 3px 6px !important;
            border-radius: 4px !important;
            font-size: 11px !important;
            font-weight: 700 !important;
            cursor: pointer;
        }

        /* Bordes de la tabla más finos */
        .fc-theme-standard td, .fc-theme-standard th {
            border: 1px solid #f1f5f9 !important;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo-box">
                <div class="logo-icon">
                    <img src="img/logo.jpeg" alt="Logo Hotel Central" style="width: 100%; height: auto; border-radius: 8px;">
                </div>
                <div>
                    <h3>Hotel Central</h3>
                    <p>Sistema de Gestión</p>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
                <a href="habitaciones.html" class="nav-link"><i class="fa-solid fa-bed"></i> Habitaciones</a>
                <a href="reservas.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Reservas</a>
                <a href="huespedes.html" class="nav-link"><i class="fa-solid fa-users"></i> Huéspedes</a>
                <a href="eventos.html" class="nav-link active"><i class="fa-solid fa-calendar-days"></i> Eventos</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h2 id="view-title">Calendario de Eventos</h2>
                    <p id="current-date" style="font-size: 0.85rem; color: #64748b; margin: 0;"></p>
                </div>
            </header>

            <section class="content-section">
                <div class="card-calendar">
                    <div id="calendar"></div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/eventos.js"></script>
</body>
</html>
