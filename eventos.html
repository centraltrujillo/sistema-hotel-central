<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | Hotel Central</title>
    
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/dashboard.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

    <style>
        /* Ajuste del tamaño del contenedor */
        .card-calendar {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #000000; /* Borde exterior negro */
            margin: 10px auto; /* Centrado */
            max-width: 900px; /* AQUÍ controlas qué tan ancho es */
        }

        /* Reducción de fuentes para que encaje en un calendario más chico */
        .fc .fc-toolbar-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px !important;
            color: #1e293b;
            text-transform: capitalize;
        }

        .fc .fc-button-primary {
            background-color: #ffffff !important;
            border: 1px solid #000000 !important; /* Botones con borde negro */
            color: #000000 !important;
            font-size: 12px !important;
            font-weight: 600;
        }

        .fc .fc-button-primary:hover {
            background-color: #800020 !important;
            color: #ffffff !important;
            border-color: #800020 !important;
        }

        .fc .fc-button-active {
            background-color: #800020 !important;
            border-color: #000000 !important;
            color: #ffffff !important;
        }

        /* Líneas del calendario NEGRAS */
        .fc-theme-standard td, 
        .fc-theme-standard th,
        .fc-theme-standard .fc-scrollgrid {
            border: 1px solid #000000 !important; /* Líneas internas negras */
        }

        /* Cabecera de Días */
        .fc .fc-col-header-cell {
            background-color: #f1f5f9;
        }

        .fc .fc-col-header-cell-cushion {
            color: #000000;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            text-decoration: none;
        }

        /* Números de los días */
        .fc .fc-daygrid-day-number {
            font-size: 13px;
            font-family: 'Lato', sans-serif;
            color: #000000;
            font-weight: bold;
            text-decoration: none;
        }

        /* Ajuste de altura de las celdas */
        .fc .fc-daygrid-day-frame {
            min-height: 80px !important; /* Celdas menos altas */
        }

        .fc-event {
            border: 1px solid #000000 !important; /* Borde negro en eventos */
            padding: 2px 4px !important;
            font-size: 10px !important;
        }
        /* Corrección para el Modal de SweetAlert */
.swal2-popup {
    border-radius: 15px !important;
    padding: 2rem !important;
    font-family: 'Lato', sans-serif !important;
}

.swal2-title {
    font-family: 'Playfair Display', serif !important;
    color: #1e293b !important;
    margin-bottom: 20px !important;
}

.swal2-input {
    height: 45px !important;
    border: 1px solid #e2e8f0 !important;
    box-shadow: none !important;
    font-size: 14px !important;
    margin: 10px auto !important;
    width: 100% !important;
}

.swal2-input:focus {
    border-color: #800020 !important; /* Burgundy al enfocar */
    box-shadow: 0 0 0 2px rgba(128, 0, 32, 0.1) !important;
}

/* Estilo para el input de color específico */
input[type="color"].swal2-input {
    padding: 2px !important;
    cursor: pointer;
    background: transparent;
}

/* Eliminar barras amarillas o bordes extraños */
.swal2-html-container {
    margin: 1em 1.6em 0.3em !important;
    overflow: hidden !important; /* Evita scrolls innecesarios */
}

.swal2-actions {
    margin-top: 25px !important;
}
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo-box">
                <div class="logo-icon">
                    <img src="img/logo.jpeg" alt="Logo Hotel Central" style="width: 100%; height: auto; border-radius: 8px;">
                </div>
                <div>
                    <h3>Hotel Central</h3>
                    <p>Sistema de Gestión</p>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
                <a href="habitaciones.html" class="nav-link"><i class="fa-solid fa-bed"></i> Habitaciones</a>
                <a href="reservas.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Reservas</a>
                <a href="huespedes.html" class="nav-link"><i class="fa-solid fa-users"></i> Huéspedes</a>
                <a href="eventos.html" class="nav-link active"><i class="fa-solid fa-calendar-days"></i> Eventos</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h2 id="view-title">Calendario de Eventos</h2>
                    <p id="current-date" style="font-size: 0.85rem; color: #64748b; margin: 0;"></p>
                </div>
            </header>

            <section class="content-section">
                <div class="card-calendar">
                    <div id="calendar"></div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/eventos.js"></script>
</body>
</html>
