<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | Hotel Central</title>
    
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/dashboard.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo-box">
                <div class="logo-icon">
                    <img src="img/logo.jpeg" alt="Logo Hotel Central" style="width: 100%; height: auto; border-radius: 8px;">
                </div>
                <div>
                    <h3>Hotel Central</h3>
                    <p>Sistema de Gestión</p>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
                <a href="habitaciones.html" class="nav-link"><i class="fa-solid fa-bed"></i> Habitaciones</a>
                <a href="reservas.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Reservas</a>
                <a href="huespedes.html" class="nav-link"><i class="fa-solid fa-users"></i> Huéspedes</a>
                <a href="eventos.html" class="nav-link active"><i class="fa-solid fa-calendar-days"></i> Eventos</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h2 id="view-title">Calendario de Eventos</h2>
                    <p id="current-date" style="font-size: 0.85rem; color: #64748b; margin: 0;"></p>
                </div>
            </header>

            <section class="content-section">
                <div class="card-calendar">
                    <div id="calendar"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/eventos.js"></script>
</body>
</html>
