<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Huéspedes | Hotel Central</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/huespedes.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo-box">
                <div class="logo-icon"><img src="img/logo.jpeg" alt="Logo" style="width: 100%; height: auto; border-radius: 8px;"></div>
                <div>
                    <h3>Hotel Central</h3>
                    <p>Sistema de Gestión</p>
                </div>
            </div>
            <nav class="nav-menu">
              <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
              <a href="habitaciones.html" class="nav-link"><i class="fa-solid fa-bed"></i> Habitaciones</a>
              <a href="reservas.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Reservas</a>
              <a href="huespedes.html" class="nav-link active"><i class="fa-solid fa-users"></i> Huéspedes</a>
              <a href="checkin.html" class="nav-link"><i class="fa-solid fa-right-to-bracket"></i> Check-in/Out</a>
              <a href="calendario.html" class="nav-link"><i class="fa-solid fa-calendar-days"></i> Calendario</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header-container">
                <div class="header-text">
                    <h2>Gestión de Huéspedes</h2>
                </div>
                <button class="btn-add" id="openModalBtn"><i class="fa-solid fa-plus"></i> Nuevo Huésped</button>
            </div>

            <div class="stats-container">
                <div class="stat-card-main">
                    <i class="fa-solid fa-user-check"></i>
                    <div>
                        <span>Huéspedes Registrados Hoy</span>
                        <h3 id="totalHuespedesHoy">0</h3>
                    </div>
                </div>
            </div>

            <div class="search-section">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="inputBuscar" placeholder="Buscar por nombre, DNI o correo...">
                </div>
                <select id="filtroEstado">
                    <option value="todos">Ver Historial Completo</option>
                    <option value="hoy">Solo los de Hoy</option>
                </select>
            </div>

            <div class="huespedes-grid" id="huespedesContainer">
                </div>
        </main>
    </div>

    <div id="modalHuesped" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Registrar Nuevo Huésped</h3>
                <span class="close-btn" id="closeModalBtn">&times;</span>
            </div>
            <form id="formNuevoHuesped">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombreH" placeholder="Ej: Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="emailH" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono / DNI</label>
                        <input type="text" id="telefonoH" placeholder="Documento o celular" required>
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="estadoH">
                            <option value="Regular">Regular</option>
                            <option value="VIP">VIP</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Huésped</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/huespedes.js"></script>
</body>
</html>
