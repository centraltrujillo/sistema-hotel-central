<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Huéspedes | Hotel Central</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/huespedes.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo-box">
                <div class="logo-icon"><img src="img/logo.jpeg" alt="Logo" style="width: 100%; height: auto; border-radius: 8px;"></div>
                <div>
                    <h3>Hotel Central</h3>
                    <p>Sistema de Gestión</p>
                </div>
            </div>
            <nav class="nav-menu">
              <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
              <a href="habitaciones.html" class="nav-link"><i class="fa-solid fa-bed"></i> Habitaciones</a>
              <a href="reservas.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Reservas</a>
              <a href="huespedes.html" class="nav-link active"><i class="fa-solid fa-users"></i> Huéspedes</a>
              <a href="calendario.html" class="nav-link"><i class="fa-solid fa-calendar-days"></i> Calendario</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header-container">
                <div class="header-text">
                    <h2>Gestión de Huéspedes</h2>
                </div>
                <div class="header-buttons">
                    <button class="btn-export" onclick="exportarHuespedesExcel()">
                        <i class="fa-solid fa-file-excel"></i> Exportar Excel
                    </button>
                    <button class="btn-add" onclick="abrirModalNuevo()">
                        <i class="fa-solid fa-plus"></i> Nuevo Huésped
                    </button>
                </div>
            </div>

            <div class="stats-container">
                <div class="stat-card-main">
                    <i class="fa-solid fa-user-check"></i>
                    <div>
                        <span>Total de Huéspedes Registrados</span>
                        <h3 id="totalHuespedesHoy">0</h3>
                    </div>
                </div>
            </div>

            <div class="search-section">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="buscarHuesped" placeholder="Buscar por nombre o número de documento...">
                </div>
                <select id="filtroEstado">
                    <option value="todos">Ver Historial Completo</option>
                    <option value="hoy">Solo los de Hoy</option>
                </select>
            </div>

            <div class="huespedes-grid" id="huespedesContainer"></div>

            <div id="paginacionControls" class="pagination-container"></div>
        </main>
    </div>

    <div id="modalHuesped" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Nuevo Huésped</h3>
                <span class="close-btn" onclick="cerrarModal()">&times;</span>
            </div>
            <form id="formHuesped">
                <input type="hidden" id="huespedId"> 
                <div class="form-grid">
                    <div class="form-group"><label>Nombre y Apellidos</label><input type="text" id="nombreH" required></div>
                    <div class="form-group"><label>Nacionalidad</label><input type="text" id="nacionalidadH"></div>
                    <div class="form-group">
                        <label>Tipo Documento</label>
                        <select id="tipoDocH">
                            <option value="DNI">DNI</option>
                            <option value="Pasaporte">Pasaporte</option>
                            <option value="CE">Carnet de Extranjería</option>
                        </select>
                    </div>
                    <div class="form-group"><label>N° Documento</label><input type="text" id="documentoH" required></div>
                    <div class="form-group"><label>Fecha Nacimiento</label><input type="date" id="fechaNacH"></div>
                    <div class="form-group"><label>Celular</label><input type="tel" id="celularH"></div>
                    <div class="form-group"><label>Residencia</label><input type="text" id="residenciaH"></div>
                    <div class="form-group"><label>Correo Electrónico</label><input type="email" id="emailH"></div>
                    
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="categoriaH">
                            <option value="Regular">Regular</option>
                            <option value="Frecuente">Frecuente</option>
                            <option value="VIP">VIP</option>
                            <option value="Corporativo">Corporativo</option>
                        </select>
                    </div>

                    <div class="form-group full-width"><label>Motivo de Viaje</label><textarea id="motivoH" rows="2"></textarea></div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Datos</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/huespedes.js"></script>
    <script>
        // Función para resetear y abrir el modal correctamente
        function abrirModalNuevo() {
            const form = document.getElementById('formHuesped');
            form.reset();
            document.getElementById('huespedId').value = "";
            document.getElementById('modalTitle').innerText = "Nuevo Huésped";
            
            // Habilitar campos (por si venían de 'ver detalles')
            const inputs = form.querySelectorAll('input, select, textarea');
            inputs.forEach(i => i.disabled = false);
            
            const actions = document.querySelector('.form-actions');
            if (actions) actions.style.display = 'flex';
            
            document.getElementById('modalHuesped').style.display = 'flex';
        }
    </script>
</body>
</html>
