<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendario | Hotel Central</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    
    <link rel="stylesheet" href="css/colors.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/calendario.css" />

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Estilos rápidos para los nuevos botones en el header */
        .header-actions {
            display: flex;
            gap: 10px;
        }
        .btn-header {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            text-decoration: none;
        }
        .btn-add { background-color: #10b981; color: white; }
        .btn-rooms { background-color: #800020; color: white; }
        .btn-header:hover { opacity: 0.9; transform: translateY(-2px); }
        .back-arrow { 
            color: #800020; 
            margin-right: 15px; 
            font-size: 20px; 
            text-decoration: none;
            transition: 0.3s;
        }
        .back-arrow:hover { transform: translateX(-5px); }
    </style>
</head>
<body>
    <div class="admin-layout">
        <main class="main-content">
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center;">
                    <a href="dashboard.html" class="back-arrow" title="Regresar al Dashboard">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h2 style="margin: 0;">Calendario de Reservas</h2>
                </div>
                
                <div class="header-actions">
                    <a href="reservas.html" class="btn-header btn-add">
                        <i class="fas fa-plus"></i> + Nueva reserva
                    </a>
                    <a href="habitaciones.html" class="btn-header btn-rooms">
                        <i class="fas fa-bed"></i> Ver habitaciones
                    </a>
                </div>
            </div>

            <div class="calendar-legend-container card">
                <div class="legend-title">Leyenda de Medio de Reserva</div>
                <div class="legend-grid">
                    <div class="legend-item"><span class="dot booking"></span> Booking</div>
                    <div class="legend-item"><span class="dot airbnb"></span> Airbnb</div>
                    <div class="legend-item"><span class="dot directas"></span> Directas</div>
                    <div class="legend-item"><span class="dot expedia"></span> Expedia</div>
                    <div class="legend-item"><span class="dot personal"></span> Personal</div>
                    <div class="legend-item"><span class="dot dayuse"></span> Day Use</div>
                    <div class="legend-item"><span class="dot mantenimiento"></span> Mantenimiento</div>
                    <div class="legend-item"><span class="dot gmail"></span> Gmail</div>
                </div>
            </div>

            <div id="calendar" class="card" style="padding: 20px;"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    
    <script type="module" src="js/calendario.js"></script>
</body>
</html>
