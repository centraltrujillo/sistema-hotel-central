<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendario | Hotel Central</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    
    <link rel="stylesheet" href="css/colors.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/calendario.css" />

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .btn-header {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            text-decoration: none;
        }
        .btn-add { background-color: #10b981; color: white; }
        .btn-rooms { background-color: #800020; color: white; }
        .btn-header:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .back-arrow { 
            color: #800020; 
            margin-right: 15px; 
            font-size: 20px; 
            text-decoration: none;
            transition: 0.3s;
        }
        .back-arrow:hover { transform: translateX(-5px); }

        /* Estilo para los selectores de fecha en el header */
        .select-date {
            background: white;
            color: #334155;
            border: 1px solid #e2e8f0;
            padding: 7px 10px;
            font-family: 'Lato', sans-serif;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <main class="main-content">
            
            <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div style="display: flex; align-items: center;">
                    <a href="dashboard.html" class="back-arrow" title="Regresar al Dashboard">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <div>
                        <h2 id="current-month-display" style="margin: 0; font-family: 'Playfair Display'; color: #800020;">Calendario de Reservas</h2>
                        <span style="font-size: 12px; color: #64748b; font-weight: bold;">Hotel Central - Vista de Ocupación</span>
                    </div>
                </div>
                
                <div class="header-actions">
<button id="btn-go-today" class="btn-header" style="background-color: #f1f5f9; color: #800020; border: 1px solid #d4a017;">
        <i class="fas fa-calendar-day"></i> Hoy
    </button>

                    <select id="select-month" class="btn-header select-date"></select>
                    <select id="select-year" class="btn-header select-date"></select>

                    <button id="btn-nueva-reserva" class="btn-header btn-add">
    <i class="fas fa-plus"></i> Nueva reserva
</button>
                    <a href="habitaciones.html" class="btn-header btn-rooms">
                        <i class="fas fa-bed"></i> Ver habitaciones
                    </a>
                </div>
            </div>

            <div class="calendar-legend-container card" style="margin-bottom: 15px; padding: 15px;">
                <div class="legend-title" style="font-weight: 700; color: #800020; font-size: 12px; margin-bottom: 10px; text-transform: uppercase;">
                    <i class="fas fa-info-circle"></i> Canales de Reserva
                </div>
                <div class="legend-grid" style="display: flex; flex-wrap: wrap; gap: 15px;">
                    <div class="legend-item"><span class="dot booking"></span> Booking</div>
                    <div class="legend-item"><span class="dot airbnb"></span> Airbnb</div>
                    <div class="legend-item"><span class="dot directas"></span> Directas</div>
                    <div class="legend-item"><span class="dot expedia"></span> Expedia</div>
                    <div class="legend-item"><span class="dot personal"></span> Personal</div>
                    <div class="legend-item"><span class="dot dayuse"></span> Day Use</div>
                    <div class="legend-item"><span class="dot gmail"></span> Gmail</div>
                    <div class="legend-item"><span class="dot mantenimiento"></span> Mantenimiento</div>
                    
                </div>
            </div>

            <div id="gantt-container" class="card" style="padding: 0; overflow-x: auto; border: 1px solid #e2e8f0;">
                </div>

                <div id="modalReserva" class="modal-reserva-overlay">
        
        <div class="modal-reserva-content">
            
            <div class="modal-reserva-header">
                <h3 id="modalTitle">Nueva Reserva</h3>
                <span class="close-modal" onclick="cerrarModal()">&times;</span>
            </div>

            <form id="formNuevaReserva">
                <div class="form-body-no-scroll">
                    
                    <div class="form-section-title">DATOS DEL HUÉSPED</div>
                    <div class="form-grid-compact">
                        <div class="form-group span-2"><label>Nombres</label><input type="text" id="resHuesped" required></div>
                        <div class="form-group"><label>DNI/Pasaporte</label><input type="text" id="resDoc" required></div>
                        <div class="form-group"><label>Teléfono</label><input type="tel" id="resTelefono" required></div>
                        <div class="form-group"><label>Nacionalidad</label><input type="text" id="resNacionalidad"></div>
                        <div class="form-group"><label>Nacimiento</label><input type="date" id="resNacimiento"></div>
                        <div class="form-group span-2"><label>Correo</label><input type="email" id="resCorreo"></div>
                    </div>

                    <div class="form-section-title">DETALLES DE LA ESTANCIA</div>
                    <div class="form-grid-compact">
                        <div class="form-group"><label>Habitación</label><select id="resHabitacion" required></select></div>
                        <div class="form-group"><label>Check In</label><input type="date" id="resCheckIn" required></div>
                        <div class="form-group"><label>Check Out</label><input type="date" id="resCheckOut" required></div>
                        <div id="statusDisponibilidad" class="status-badge span-3"></div>

                        <div class="form-group">
                            <label>Medio</label>
                            <select id="resMedio" required>
                                <option value="">Seleccionar...</option>
                                <option value="booking">Booking</option>
                                <option value="airbnb">Airbnb</option>
                                <option value="directas">Directas</option>
                                <option value="expedia">Expedia</option>
                                <option value="personal">Personal</option>
                                <option value="dayuse">Day Use</option>
                                <option value="gmail">Gmail</option>
                            </select>
                        </div>
                        <div class="form-group"><label>N° Pers.</label><input type="number" id="resPersonas" min="1" value="1"></div>
                        <div class="form-group"><label>Desayuno</label><select id="resInfo"><option>CON DESAYUNO</option><option>SIN DESAYUNO</option></select></div>
                        <div class="form-group"><label>Early C.I.</label><input type="time" id="resEarly"></div>
                        <div class="form-group"><label>Late C.O.</label><input type="time" id="resLate"></div>
                        <div class="form-group"><label>Cochera</label><input type="text" id="resCochera" placeholder="SI/NO"></div>
                        <div class="form-group span-3"><label>Traslado</label><input type="text" id="resTraslado"></div>
                    </div>

                    <div class="form-section-title">TARIFA DE LA RESERVA</div>
                    <div class="form-grid-compact highlight-section">
                        <div class="form-group"><label>Tarifa</label><input type="number" id="resTarifa" required></div>
                        <div class="form-group">
                            <label>Moneda</label>
                            <select id="resMoneda">
                                <option value="PEN">Soles (S/)</option>
                                <option value="USD">Dólares ($)</option>
                            </select>
                        </div>
                        <div class="form-group"><label>T. Cambio</label><input type="number" id="resTipoCambio" step="0.01"></div>
                        <div class="form-group"><label>Total</label><input type="number" id="resTotal" class="input-total" readonly></div>
                        <div class="form-group"><label>Adelanto</label><input type="number" id="resAdelantoMonto" class="input-adelanto"></div>
                        <div class="form-group"><label>Pendiente</label><input type="number" id="resDiferencia" class="input-diferencia" readonly></div>
                        <div class="form-group span-2"><label>Detalle Adelanto</label><input type="text" id="resAdelantoDetalle"></div>
                    </div>

                    <div class="form-grid-compact" style="margin-top: 10px;">
                        <div class="form-group span-2"><label>Observaciones</label><input type="text" id="resObservaciones"></div>
                        <div class="form-group"><label>Recibido por</label><input type="text" id="resRecepcion" required></div>
                        <div class="form-group"><label>Confirmado por</label><input type="text" id="resRecepcionconfi" required></div>
                    </div>
                </div>

                <div class="form-actions-res">
                    <button type="button" class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn-save">Guardar Reserva</button>
                </div>
            </form>
        </div>
    </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/calendario.js"></script>
</body>
</html>
