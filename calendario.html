<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendario | Hotel Central</title>
        <link rel="icon" type="image/png" href="img/logo.png" />

    
    <link rel="stylesheet" href="css/colors.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/calendario.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo-box">
                <div class="logo-icon"><img src="img/logo.jpeg" alt="Logo" style="width: 100%; height: auto; border-radius: 8px;"></div>
                <div>
                    <h3>Hotel Central</h3>
                    <p>Sistema de Gestión</p>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
                <a href="habitaciones.html" class="nav-link"><i class="fa-solid fa-bed"></i> Habitaciones</a>
                <a href="reservas.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Reservas</a>
                <a href="huespedes.html" class="nav-link"><i class="fa-solid fa-users"></i> Huéspedes</a>
                <a href="checkin.html" class="nav-link"><i class="fa-solid fa-right-to-bracket"></i> Check-in/Out</a>
                <a href="calendario.html" class="nav-link active"><i class="fa-solid fa-calendar-days"></i> Calendario</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h2>Calendario de Eventos</h2>
        
                </div>
            </div>

            <div class="calendar-container card">
                <div class="calendar-header">
                    <button id="prev" class="nav-btn"><i class="fa-solid fa-chevron-left"></i></button>
                    <h2 id="monthYear">Marzo 2026</h2>
                    <button id="next" class="nav-btn"><i class="fa-solid fa-chevron-right"></i></button>
                </div>

                <div class="days-header">
                    <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div>
                    <div>Jue</div><div>Vie</div><div>Sáb</div>
                </div>

                <div class="days" id="days"></div>
            </div>
        </main>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detalles del Evento</h3>
                <span class="close">&times;</span>
            </div>
            
            <form id="eventForm">
                <input type="hidden" id="fecha" />
                <div class="form-group">
                    <label>Título del Evento</label>
                    <input type="text" id="titulo" placeholder="Ej: Mantenimiento Aire Acondicionado" required />
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="descripcion" rows="3" placeholder="Detalles adicionales..."></textarea>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Hora</label>
                        <input type="time" id="hora" />
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="tipo">
                            <option value="Mantenimiento">🛠️ Mantenimiento</option>
                            <option value="Limpieza">🧹 Limpieza Profunda</option>
                            <option value="Evento">🎉 Evento Especial</option>
                            <option value="Admin">📋 Administrativo</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="guardarEvento" class="btn-primary">Guardar</button>
                    <button type="button" id="eliminarEvento" class="btn-delete">Eliminar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/calendario.js"></script>
</body>
</html>
