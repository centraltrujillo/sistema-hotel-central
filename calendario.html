<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendario | Hotel Central</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    
    <link rel="stylesheet" href="css/colors.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/calendario.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo-box">
                <div class="logo-icon"><img src="img/logo.jpeg" alt="Logo" style="width: 100%; height: auto; border-radius: 8px;"></div>
                <div>
                    <h3>Hotel Central</h3>
                    <p>Sistema de Gestión</p>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
                <a href="habitaciones.html" class="nav-link"><i class="fa-solid fa-bed"></i> Habitaciones</a>
                <a href="reservas.html" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Reservas</a>
                <a href="calendario.html" class="nav-link active"><i class="fa-solid fa-calendar-days"></i> Calendario</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h2>Calendario de Reservas</h2>
            </div>

            <div class="calendar-legend-container card">
    <div class="legend-title">Leyenda: Medio de Reserva</div>
    <div class="legend-grid">
        <div class="legend-item"><span class="dot booking"></span> Booking</div>
        <div class="legend-item"><span class="dot airbnb"></span> Airbnb</div>
        <div class="legend-item"><span class="dot directas"></span> Directas</div>
        <div class="legend-item"><span class="dot expedia"></span> Expedia</div>
        <div class="legend-item"><span class="dot personal"></span> Personal</div>
        <div class="legend-item"><span class="dot dayuse"></span> Day Use</div>
        <div class="legend-item"><span class="dot mantenimiento"></span> Mantenimiento</div>
        <div class="legend-item"><span class="dot gmail"></span> Gmail</div>
    </div>
</div>

<div id="calendar" class="card" style="padding: 20px;"></div>
            
            <div id="calendar" class="calendar-container"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script type="module" src="js/calendario.js"></script>
</body>
</html>
